spring:
  application:
    name: service-ware
  profiles:
    active: dev
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        namespace: dev-namespace-uuid
        file-extension: yaml
        group: service-ware
        extension-configs:
          - data-id: mybatis.yaml
            refresh: true
            group: COMMON_GROUP
          - data-id: datasource-common.yaml
            refresh: true
            group: COMMON_GROUP
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: dev-namespace-uuid
server:
  port: 11000